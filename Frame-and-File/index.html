    '<div style="font-size:48px;font-weight:700;color:var(--ink);letter-spacing:-0.04em;line-height:1">'+team.rating+'</div>' +
    '<div>'+renderStars(team.rating,15)+'<div style="font-size:12px;color:var(--ink-3);margin-top:4px">'+team.reviewCount+' verified reviews</div></div></div>' +
    reviews + '</div></div>' +
    '<div>' +
    '<div class="sticky-contact">' +
    '<div style="font-size:18px;font-weight:700;letter-spacing:-0.02em;margin-bottom:4px">Work with '+team.name.split(' ')[0]+'</div>' +
    '<div style="font-size:12px;color:var(--ink-3);margin-bottom:18px">'+availMsg+'</div>' +

    '</div></div></div></div>';
}

// SUPPORT PORTAL
// ════════════════════════════════════════════
function renderSupportPortal() {
  const myTickets = state.currentUser ? state.supportTickets.filter(function(t){return t.submitterEmail===state.currentUser.email;}) : [];
  const myTeam = getMyTeam();
  const teamTickets = myTeam ? state.supportTickets.filter(function(t){return t.teamId===myTeam.id;}) : [];

  const tabsHtml = '<div class="nav-tabs" style="width:fit-content;margin-bottom:24px">' +
    '<button class="nav-tab '+(state.supportTab==='new'?'active':'')+'" onclick="setState({supportTab:\'new\'})">New ticket</button>' +
    '<button class="nav-tab '+(state.supportTab==='my-tickets'?'active':'')+'" onclick="setState({supportTab:\'my-tickets\'})">My tickets ('+myTickets.length+')</button>' +
    (myTeam?'<button class="nav-tab '+(state.supportTab==='team-tickets'?'active':'')+'" onclick="setState({supportTab:\'team-tickets\'})">Team ('+teamTickets.length+')</button>':'') +
    '</div>';

  const tList = function(tickets) {
    if (!tickets.length) return '<div style="text-align:center;padding:40px 0;color:var(--ink-3)">No tickets here yet.</div>';
    return tickets.map(function(tk){
      const bdg = tk.status==='resolved'?'success':tk.status==='investigating'?'info':'amber';

async function runBriefParser() {
  if (!state.briefText.trim()) return;
  setState({briefLoading:true,briefResult:null});
  const names = state.templates.map(function(t){return t.id+': '+(PLAIN_NAMES[t.id]?PLAIN_NAMES[t.id].name:t.name)+' ('+t.category+')';}).join('\n');
  const prompt = 'You are a production manager for an AV agency in Nairobi. Parse this brief and respond ONLY with valid JSON.\n\nBrief:\n"""\n'+state.briefText+'\n"""\n\nAvailable templates:\n'+names+'\n\nJSON:\n{"projectType":"","matchedTemplateId":"or null","confidence":"high|medium|low","summary":"","outputs":[],"estimatedDays":0,"estimatedCost":0,"missingInfo":[],"flags":[],"teamNote":""}';
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const data = await res.json();
    const raw=(data.content&&data.content.find(function(b){return b.type==='text';})&&data.content.find(function(b){return b.type==='text';}).text)||'{}';
    setState({briefResult:JSON.parse(raw.replace(/```json|```/g,'').trim()),briefLoading:false});
  } catch(e){setState({briefResult:{error:'Error: '+e.message},briefLoading:false});}
}

function renderBriefParser() {
  let result='';
  if (state.briefLoading) result='<div class="ai-result" style="display:flex;align-items:center;gap:10px"><div class="spinner"></div> Parsing\u2026</div>';
  else if (state.briefResult) {
    const r=state.briefResult;
    if (r.error) result='<div class="ai-result" style="color:var(--red)">'+r.error+'</div>';
    else {
      const matched=r.matchedTemplateId?state.templates.find(function(t){return t.id===r.matchedTemplateId;}):null;
      const confColor=r.confidence==='high'?'var(--green)':r.confidence==='medium'?'var(--amber)':'var(--red)';
      result='<div class="ai-result">' +
        '<div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap">' +
        '<span style="font-size:17px;font-weight:700">'+( r.projectType||'Unknown')+'</span>' +
        '<span class="badge" style="background:var(--base-4);color:'+confColor+'">'+r.confidence+' confidence</span>' +
        (matched?'<span class="badge info">&rarr; '+(PLAIN_NAMES[matched.id]?PLAIN_NAMES[matched.id].name:matched.name)+'</span>':'')+'</div>' +
        '<p style="font-size:13px;margin-bottom:12px;color:var(--ink-2)">'+( r.summary||'')+'</p>' +
        '<div class="grid-2" style="margin-bottom:12px"><div class="metric-card"><div class="label">Est. days</div><div class="value">'+(r.estimatedDays||'?')+'</div></div><div class="metric-card"><div class="label">Est. cost</div><div class="value" style="font-size:16px">'+(r.estimatedCost?fmt(r.estimatedCost):'?')+'</div></div></div>' +
        ((r.flags&&r.flags.length)?'<div style="margin-bottom:10px">'+r.flags.map(function(f){return '<span class="badge amber" style="margin:2px">'+f+'</span>';}).join('')+'</div>':'') +
        ((r.missingInfo&&r.missingInfo.length)?'<div style="font-size:12px;color:var(--ink-3);margin-bottom:8px"><strong style="color:var(--ink-2)">Ask the client:</strong> '+r.missingInfo.join(', ')+'</div>':'') +
        (r.teamNote?'<div style="border-top:1px solid var(--border);padding-top:10px;font-size:12px;color:var(--ink-3);font-style:italic">'+r.teamNote+'</div>':'') +
        (matched?'<div style="margin-top:12px"><button class="btn primary sm" onclick="addToCart(\''+matched.id+'\');setState({view:\'browse\'})">Add to client brief &rarr;</button></div>':'') +
        '</div>';
    }
  }
  return '<div><div class="section-title">AI Brief Parser</div><div class="section-sub">Paste a client brief &mdash; WhatsApp, email, voice note transcript &mdash; and get a structured scope and cost estimate.</div>' +
    '<div class="ai-area"><div class="ai-header"><div class="ai-dot"></div> Paste brief</div>' +
    '<div class="ai-body"><textarea rows="6" placeholder="e.g. \'Hey we need something for the NGO launch next week\u2026\'" oninput="state.briefText=this.value">'+state.briefText+'</textarea>' +
    '<button class="btn primary" style="margin-top:10px" onclick="runBriefParser()" '+(state.briefLoading?'disabled':'')+'>'+(state.briefLoading?'<div class="spinner"></div> Parsing\u2026':'Parse brief &#8599;')+'</button>' +
    result+'</div></div></div>';
}

// CANVAS + REVEAL
// ════════════════════════════════════════════
function initCanvas() {
  const canvas=document.getElementById('bg-canvas');
  if (!canvas) return;
  if (canvas._running) return;
  canvas._running=true;
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  window.addEventListener('resize',function(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
  const COLS=['rgba(232,149,10,0.3)','rgba(245,200,66,0.2)','rgba(232,149,10,0.15)'];
  const pts=Array.from({length:35},function(){return{x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:1+Math.random()*2,c:COLS[Math.floor(Math.random()*COLS.length)]};});
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(let i=0;i<pts.length;i++){for(let j=i+1;j<pts.length;j++){const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<130){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.strokeStyle='rgba(232,149,10,'+(0.04*(1-d/130))+')';ctx.lineWidth=0.7;ctx.stroke();}}}
    pts.forEach(function(p){p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>canvas.width)p.vx*=-1;if(p.y<0||p.y>canvas.height)p.vy*=-1;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.c;ctx.fill();});
    requestAnimationFrame(draw);
  }
  draw();
}

function initReveal() {
  const els=document.querySelectorAll('.reveal');
  els.forEach(function(el,i){el.style.transitionDelay=(i*.04)+'s';});
  const obs=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}});},{threshold:.1});
  els.forEach(function(el){obs.observe(el);});
}

// MAIN RENDER
// ════════════════════════════════════════════
function render() {
  const root=document.getElementById('root');
  let html='';
  if (state.view==='landing') html=renderLanding();
  else if (state.view==='browse') html=renderBrowse();
  else if (state.view==='quote') html=renderQuote();
  else if (state.view==='quote-sent') html=renderQuoteSent();
  else if (state.view==='team') html=renderTeam();
  else if (state.view==='teams') html=renderTeamsDirectory();
  else if (state.view==='team-profile') html=renderTeamProfile();
  else if (state.view==='support') html=renderSupportPortal();
  else if (state.view==='messages') html=renderClientMessages();
  root.innerHTML=html;
  setTimeout(initCanvas,10);
  setTimeout(initReveal,20);
}

// PASSWORD RESET (simulated)
// ════════════════════════════════════════════
function doForgotPassword() {
  if (!state.authEmail.trim()) { showToast('Enter your email first'); return; }
  var user = state.users.find(function(u){ return u.email === state.authEmail; });
  if (!user) { showToast('No account found for that email'); return; }
  // In production: send real reset email. Here we simulate with a token.
  var token = Math.random().toString(36).slice(2,10).toUpperCase();
  state._resetTokens = state._resetTokens || {};
  state._resetTokens[token] = state.authEmail;
  setState({ authMode: 'reset-sent', resetToken: token });
  showToast('Reset instructions sent to ' + state.authEmail);
}

function doResetPassword() {
  if (!state.resetNewPassword || state.resetNewPassword.length < 6) { showToast('Password must be at least 6 characters'); return; }
  var email = state._resetTokens && state._resetTokens[state.resetToken];
  if (!email) { showToast('Invalid or expired reset token'); return; }
  var newUsers = state.users.map(function(u){
    if (u.email !== email) return u;
    return Object.assign({}, u, { password: state.resetNewPassword });
  });
  setState({ users: newUsers, authMode: 'login', resetToken: null, resetNewPassword: '' });
  showToast('Password updated — please sign in');
}

// Extend renderAuthOverlay to handle reset flows
var _origRenderAuthOverlay = renderAuthOverlay;
renderAuthOverlay = function() {
  if (!state.showAuth) return '';
  var mode = state.authMode;

  // Forgot password — enter email
  if (mode === 'forgot') {
    return '<div class="auth-overlay" onclick="if(event.target===this)setState({showAuth:false,authQuoteGate:false})">' +
      '<div class="auth-modal">' +
      '<h2>Reset password</h2>' +
      '<p class="auth-sub">Enter your account email and we\'ll send reset instructions.</p>' +
      '<div class="form-row" style="margin-bottom:16px"><label class="form-label">Email</label><input type="email" placeholder="you@example.com" value="' + state.authEmail + '" oninput="state.authEmail=this.value" onkeydown="if(event.key===\'Enter\')doForgotPassword()" /></div>' +
      '<button class="btn primary" style="width:100%;margin-bottom:10px" onclick="doForgotPassword()">Send reset link</button>' +
      '<div class="auth-toggle"><a onclick="setState({authMode:\'login\'})">&#8592; Back to sign in</a></div>' +
      '</div></div>';
  }

  // Reset sent — show simulated token + new password form
  if (mode === 'reset-sent') {
    return '<div class="auth-overlay">' +
      '<div class="auth-modal">' +
      '<div style="font-size:28px;margin-bottom:12px">&#128274;</div>' +
      '<h2>Reset your password</h2>' +
      '<p class="auth-sub">In production, a link is emailed. For this demo, use the token below.</p>' +
      '<div style="background:var(--base-4);border:1px solid var(--amber);border-radius:var(--r-md);padding:14px;text-align:center;margin-bottom:16px">' +
      '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink-4);margin-bottom:6px">Demo reset token</div>' +
      '<div style="font-size:22px;font-weight:800;letter-spacing:0.12em;color:var(--amber)">' + (state.resetToken||'') + '</div>' +
      '</div>' +
      '<div class="form-row" style="margin-bottom:10px"><label class="form-label">Reset token</label><input placeholder="Paste token above" oninput="state.resetToken=this.value" value="' + (state.resetToken||'') + '" /></div>' +
      '<div class="form-row" style="margin-bottom:16px"><label class="form-label">New password</label><input type="password" placeholder="Min 6 characters" oninput="state.resetNewPassword=this.value" /></div>' +
      '<button class="btn primary" style="width:100%" onclick="doResetPassword()">Set new password</button>' +
      '</div></div>';
  }

  // Default — call original
  return _origRenderAuthOverlay();
};

// Patch renderAuthOverlay to add "Forgot password?" link
var _orig2 = renderAuthOverlay;
renderAuthOverlay = function() {
  var html = _orig2();
  if (!html) return html;
  // Inject forgot link before </div></div> at end of login form
  if (state.authMode === 'login') {

};

// CLIENT MESSAGES HUB
// ════════════════════════════════════════════
function renderClientMessages() {
  var user = state.currentUser;
  if (!user) {
    return renderNav('client-dashboard') + renderAuthOverlay() +
      '<div class="section"><div class="empty-state"><span class="empty-state-icon">&#128274;</span><div class="empty-state-title">Sign in to view messages</div><button class="btn primary" onclick="setState({showAuth:true,authMode:\'login\'})">Sign in</button></div></div>';
  }

  var myProjects = state.projects.filter(function(p){ return p.clientId === user.id; });
  var selected = state.activeProjectId ? state.projects.find(function(p){ return p.id === state.activeProjectId; }) : myProjects[0];

  if (!myProjects.length) {
    return renderNav('client-dashboard') + renderAuthOverlay() +
      '<div class="section"><div class="empty-state"><span class="empty-state-icon">&#128172;</span><div class="empty-state-title">No conversations yet</div><div class="empty-state-desc">Messages will appear here once a team accepts your brief and your project kicks off.</div><button class="btn primary" onclick="setState({view:\'browse\'})">Submit a brief</button></div></div>';
  }

  // Sidebar: list of projects/conversations
  var sidebar = myProjects.map(function(p) {
    var thread = state.messages[p.id] || [];
    var lastMsg = thread.filter(function(m){ return m.senderRole !== 'system'; }).slice(-1)[0];
    var unread = thread.filter(function(m){ return m.senderRole === 'team'; }).length;
    var isActive = selected && selected.id === p.id;
    var team = state.productionTeams.find(function(t){ return t.id === p.teamId; });
    return '<div onclick="setState({activeProjectId:\'' + p.id + '\',view:\'messages\'})" style="' +
      'display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;border-bottom:1px solid var(--border);' +
      'background:' + (isActive ? 'var(--base-3)' : 'transparent') + ';' +
      'border-left:3px solid ' + (isActive ? 'var(--amber)' : 'transparent') + ';' +
      'transition:all 0.15s">' +
      (team ? '<div style="width:38px;height:38px;border-radius:10px;background:' + team.accentColor + ';display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--base);font-weight:800;flex-shrink:0">' + team.initials + '</div>' : '<div style="width:38px;height:38px;border-radius:10px;background:var(--base-5);flex-shrink:0"></div>') +
      '<div style="flex:1;min-width:0">' +
      '<div style="font-size:13px;font-weight:' + (isActive ? '700' : '600') + ';white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + (team ? team.name : p.teamName) + '</div>' +
      '<div style="font-size:11px;color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + (lastMsg ? lastMsg.text.slice(0, 42) + (lastMsg.text.length > 42 ? '\u2026' : '') : 'No messages yet') + '</div>' +
      '</div>' +
      (unread > 0 ? '<span style="background:var(--amber);color:var(--base);font-size:9px;font-weight:800;padding:2px 6px;border-radius:99px;flex-shrink:0">' + unread + '</span>' : '') +
      '</div>';
  }).join('');

  // Active chat
  var chat = '';
  if (selected) {
    var thread = state.messages[selected.id] || [];
    var bubbles = thread.map(function(msg) {
      var isMe = msg.senderId === user.id;
      var isSys = msg.senderRole === 'system';
      if (isSys) return '<div class="chat-msg system-msg"><div class="chat-bubble">&#128274; ' + msg.text + '</div><div class="chat-meta">' + msg.timestamp + '</div></div>';
      var cls = isMe ? 'from-me' : 'from-other';
      return '<div class="chat-msg ' + cls + '">' +
        (!isMe ? '<div class="chat-sender">' + msg.senderName + '</div>' : '') +
        '<div class="chat-bubble">' + msg.text + '</div>' +
        '<div class="chat-meta">' + msg.timestamp + '</div></div>';
    }).join('');

    var teamForChat = state.productionTeams.find(function(t){ return t.id === selected.teamId; });
    var sm = statusMeta(selected.status);

    chat = '<div style="display:flex;flex-direction:column;height:calc(100vh - 56px)">' +
      // Chat header
      '<div style="padding:14px 20px;border-bottom:1px solid var(--border);background:var(--base-3);display:flex;align-items:center;gap:12px">' +
      (teamForChat ? '<div style="width:36px;height:36px;border-radius:9px;background:' + teamForChat.accentColor + ';display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--base);font-weight:800;flex-shrink:0">' + teamForChat.initials + '</div>' : '') +
      '<div style="flex:1"><div style="font-size:13px;font-weight:700">' + (teamForChat ? teamForChat.name : selected.teamName) + '</div>' +
      '<div style="font-size:11px;color:var(--ink-3)">' + selected.title + ' &middot; <span class="brief-status ' + sm.cls + '" style="font-size:9px;padding:1px 6px">' + sm.label + '</span></div></div>' +
      '<button class="btn sm ghost" style="color:var(--ink-3);font-size:11px" onclick="setState({view:\'project\',activeProjectId:\'' + selected.id + '\',projectTab:\'overview\'})">View project &rarr;</button>' +
      '</div>' +
      // Thread
      '<div class="chat-thread" id="chat-thread-' + selected.id + '" style="flex:1;overflow-y:auto;padding:20px">' + bubbles + '</div>' +
      // Composer
      '<div class="chat-composer">' +
      '<input placeholder="Message ' + (teamForChat ? teamForChat.name : selected.teamName) + '\u2026" value="' + state.newMessage + '" oninput="state.newMessage=this.value" onkeydown="if(event.key===\'Enter\')sendMessage(\'' + selected.id + '\')" />' +
      '<button onclick="sendMessage(\'' + selected.id + '\')">Send</button>' +
      '</div></div>';

    setTimeout(function(){ var el = document.getElementById('chat-thread-' + selected.id); if(el) el.scrollTop = el.scrollHeight; }, 60);
  }

  return renderNav('messages') + renderAuthOverlay() +
    '<div style="display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 56px);overflow:hidden">' +
    // Sidebar
    '<div style="border-right:1px solid var(--border);overflow-y:auto;background:var(--base-2)">' +
    '<div style="padding:16px;border-bottom:1px solid var(--border)">' +
    '<div style="font-size:15px;font-weight:700;letter-spacing:-0.02em">Messages</div>' +
    '<div style="font-size:11px;color:var(--ink-4);margin-top:2px">' + myProjects.length + ' conversation' + (myProjects.length !== 1 ? 's' : '') + '</div>' +
    '</div>' +
    sidebar +
    '</div>' +
    // Chat
    (chat || '<div style="display:flex;align-items:center;justify-content:center;color:var(--ink-4);font-size:13px">Select a conversation</div>') +
    '</div>';
}
