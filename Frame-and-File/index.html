<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frame & File — Production Marketplace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --base:    #0d0c0b;
  --base-2:  #131210;
  --base-3:  #1a1815;
  --base-4:  #242018;
  --base-5:  #2e2a24;
  --ink:     #f0ede8;
  --ink-2:   #cbc6be;
  --ink-3:   #8a8480;
  --ink-4:   #5a5550;
  --amber:   #e8950a;
  --amber-2: #f5c842;
  --amber-dim: rgba(232,149,10,0.12);
  --amber-glow: rgba(232,149,10,0.2);
  --red:     #e05252;
  --green:   #3dba76;
  --blue:    #4a9eff;
  --border:  rgba(255,255,255,0.07);
  --border-2: rgba(255,255,255,0.12);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.4);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.5);
  --shadow-lg: 0 12px 48px rgba(0,0,0,0.6);
  --shadow-amber: 0 0 24px rgba(232,149,10,0.15);
  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 16px;
  --r-xl: 20px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--base);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
#root { min-height: 100vh; position: relative; z-index: 1; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--base-2); }
::-webkit-scrollbar-thumb { background: var(--base-5); border-radius: 99px; }

/* ── CANVAS + ORBS ── */
#bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.6; }
.orb { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(100px); }
.orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(232,149,10,0.08), transparent 65%); top: -200px; right: -150px; animation: orb-1 25s ease-in-out infinite; }
.orb-2 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(245,200,66,0.05), transparent 65%); bottom: 0; left: -100px; animation: orb-2 32s ease-in-out infinite; }
.orb-3 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(232,149,10,0.04), transparent 65%); top: 40%; left: 30%; animation: orb-3 40s ease-in-out infinite; }
@keyframes orb-1 { 0%,100%{transform:translate(0,0)} 40%{transform:translate(-60px,40px)} 70%{transform:translate(30px,-30px)} }
@keyframes orb-2 { 0%,100%{transform:translate(0,0)} 35%{transform:translate(50px,-60px)} 75%{transform:translate(-30px,30px)} }
@keyframes orb-3 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(60px,60px)} }

/* ── REVEAL ── */
.reveal { opacity: 0; transform: translateY(20px); transition: opacity 0.6s ease, transform 0.6s ease; }
.reveal.visible { opacity: 1; transform: none; }

/* ── NAV ── */
.nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; height: 56px;
  background: rgba(13,12,11,0.85);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(16px);
}
.nav-logo {
  display: flex; align-items: center; gap: 10px;
  font-size: 16px; font-weight: 700; color: var(--ink);
  letter-spacing: -0.02em; cursor: pointer; text-decoration: none;
}
.logo-mark {
  width: 28px; height: 28px;
  background: var(--amber);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.logo-mark span { color: var(--base); font-size: 13px; font-weight: 800; }
.nav-actions { display: flex; align-items: center; gap: 8px; }
.nav-tabs { display: flex; gap: 2px; background: var(--base-3); padding: 3px; border-radius: var(--r-md); border: 1px solid var(--border); }
.nav-tab {
  padding: 5px 14px; border-radius: 7px; border: none;
  background: transparent; cursor: pointer;
  font-size: 12.5px; font-family: 'Space Grotesk', sans-serif;
  color: var(--ink-3); transition: all 0.15s; font-weight: 500;
}
.nav-tab:hover { color: var(--ink); }
.nav-tab.active { background: var(--base-5); color: var(--ink); box-shadow: var(--shadow-sm); }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 9px 18px; border-radius: var(--r-md);
  border: 1px solid var(--border-2);
  background: var(--base-3); cursor: pointer;
  font-size: 13px; font-family: 'Space Grotesk', sans-serif;
  color: var(--ink); font-weight: 500;
  transition: all 0.15s; text-decoration: none; white-space: nowrap;
}
.btn:hover { background: var(--base-4); border-color: var(--border-2); }
.btn.primary { background: var(--amber); color: var(--base); border-color: var(--amber); font-weight: 600; }
.btn.primary:hover { background: #f0a020; box-shadow: var(--shadow-amber); }
.btn.ghost { border-color: transparent; background: transparent; }
.btn.ghost:hover { background: var(--base-3); }
.btn.sm { padding: 6px 12px; font-size: 12px; border-radius: var(--r-sm); }
.btn.danger { border-color: rgba(224,82,82,0.3); color: var(--red); }
.btn.danger:hover { background: rgba(224,82,82,0.1); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn.outline-amber { border-color: var(--amber); color: var(--amber); background: transparent; }
.btn.outline-amber:hover { background: var(--amber-dim); box-shadow: var(--shadow-amber); }

/* ── CARDS ── */
.card {
  background: var(--base-2);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 20px 22px;
}
.card-raised {
  background: var(--base-3);
  border: 1px solid var(--border-2);
  border-radius: var(--r-lg);
  padding: 20px 22px;
  box-shadow: var(--shadow-md);
}
.metric-card {
  background: var(--base-3);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 14px 16px;
  text-align: center;
}
.metric-card .label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-4); margin-bottom: 5px; }
.metric-card .value { font-size: 22px; font-weight: 700; color: var(--ink); }

/* ── BADGES ── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 99px;
  font-size: 10.5px; font-weight: 600; letter-spacing: 0.02em;
}
.badge.amber { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(232,149,10,0.2); }
.badge.success { background: rgba(61,186,118,0.12); color: var(--green); border: 1px solid rgba(61,186,118,0.2); }
.badge.info { background: rgba(74,158,255,0.12); color: var(--blue); border: 1px solid rgba(74,158,255,0.2); }
.badge.neutral { background: var(--base-4); color: var(--ink-3); border: 1px solid var(--border); }
.badge.custom { background: rgba(139,92,246,0.12); color: #a78bfa; border: 1px solid rgba(139,92,246,0.2); }
.tag {
  display: inline-block; padding: 3px 9px;
  border-radius: 99px; font-size: 11px;
  background: var(--base-4); color: var(--ink-3);
  border: 1px solid var(--border); font-weight: 500;
}

/* ── INPUTS ── */
input, textarea, select {
  width: 100%; padding: 10px 13px;
  border: 1px solid var(--border-2);
  border-radius: var(--r-md);
  background: var(--base-3);
  color: var(--ink);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px; outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
input:focus, textarea:focus, select:focus {
  border-color: var(--amber);
  box-shadow: 0 0 0 3px rgba(232,149,10,0.1);
}
input::placeholder, textarea::placeholder { color: var(--ink-4); }
textarea { resize: vertical; min-height: 90px; line-height: 1.7; }
select option { background: var(--base-3); color: var(--ink); }
.form-row { margin-bottom: 14px; }
.form-label { display: block; font-size: 11.5px; font-weight: 600; color: var(--ink-3); margin-bottom: 5px; letter-spacing: 0.02em; text-transform: uppercase; }

/* ── GRIDS ── */
.grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; }
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; }
.grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }

/* ── SECTION ── */
.section { padding: 28px 28px 40px; }
.section-title { font-size: 24px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 4px; }
.section-sub { font-size: 13px; color: var(--ink-3); margin-bottom: 24px; line-height: 1.6; }

/* ── DIVIDER ── */
.divider { height: 1px; background: var(--border); margin: 14px 0; }

/* ── CHIPS ── */
.chips-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 24px; }
.chip {
  padding: 6px 16px; border-radius: 99px;
  border: 1px solid var(--border-2);
  font-size: 12px; font-weight: 500;
  cursor: pointer; background: var(--base-3);
  color: var(--ink-3); transition: all 0.15s;
}
.chip:hover { border-color: var(--amber); color: var(--ink); }
.chip.active { background: var(--amber); color: var(--base); border-color: var(--amber); font-weight: 600; }

/* ── SPINNER ── */
.spinner { width: 16px; height: 16px; border: 2px solid var(--base-5); border-top-color: var(--amber); border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes modal-in { from { opacity: 0; transform: translateY(14px) scale(0.97); } to { opacity: 1; transform: none; } }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── TOAST ── */
.toast { position: fixed; bottom: 24px; right: 24px; z-index: 400; background: var(--base-5); color: var(--ink); padding: 12px 18px; border-radius: var(--r-md); font-size: 13px; font-weight: 500; box-shadow: var(--shadow-lg); border: 1px solid var(--border-2); animation: toast-in 0.3s ease; }
@keyframes toast-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

/* ── USER AVATAR ── */
.user-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--amber); color: var(--base); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; cursor: pointer; flex-shrink: 0; }

/* ── AUTH MODAL ── */
.auth-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 300; padding: 20px; }
.auth-modal { background: var(--base-3); border: 1px solid var(--border-2); border-radius: var(--r-xl); padding: 36px 40px; width: 100%; max-width: 440px; box-shadow: var(--shadow-lg); animation: modal-in 0.25s ease; }
.auth-modal h2 { font-size: 26px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 4px; }
.auth-sub { color: var(--ink-3); font-size: 13px; margin-bottom: 24px; }
.auth-toggle { text-align: center; margin-top: 16px; font-size: 12.5px; color: var(--ink-4); }
.auth-toggle a { color: var(--amber); cursor: pointer; font-weight: 600; }

/* ── LANDING ── */
.landing { min-height: calc(100vh - 56px); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 80px 24px 60px; position: relative; overflow: hidden; }
.landing-eyebrow { display: inline-flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--amber); background: var(--amber-dim); padding: 5px 14px; border-radius: 99px; margin-bottom: 24px; border: 1px solid rgba(232,149,10,0.2); }
.landing h1 { font-size: clamp(40px, 7vw, 72px); font-weight: 700; line-height: 1.0; margin-bottom: 18px; max-width: 760px; letter-spacing: -0.04em; }
.landing h1 em { color: var(--amber); font-style: normal; }
.landing h1 .dim { color: var(--ink-4); }
.landing-sub { color: var(--ink-3); font-size: 16px; margin-bottom: 52px; max-width: 480px; line-height: 1.7; }

/* ── OCCASION CARDS (client entry) ── */
.occasion-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; max-width: 900px; width: 100%; }
.occasion-card {
  background: var(--base-3);
  border: 1px solid var(--border);
  border-radius: var(--r-xl); padding: 24px 22px;
  cursor: pointer; text-align: left;
  transition: all 0.22s; position: relative; overflow: hidden;
}
.occasion-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--amber), var(--amber-2)); opacity: 0; transition: opacity 0.2s; }
.occasion-card:hover { border-color: var(--amber); box-shadow: var(--shadow-amber), var(--shadow-md); transform: translateY(-2px); }
.occasion-card:hover::before { opacity: 1; }
.occasion-icon { font-size: 28px; margin-bottom: 12px; display: block; }
.occasion-title { font-size: 15px; font-weight: 700; margin-bottom: 5px; letter-spacing: -0.02em; }
.occasion-desc { font-size: 12px; color: var(--ink-3); line-height: 1.55; }

/* ── LANDING STATS ── */
.landing-stats { display: flex; gap: 36px; margin-top: 52px; }
.lstat { text-align: center; }
.lstat-num { font-size: 30px; font-weight: 700; color: var(--amber); letter-spacing: -0.03em; }
.lstat-label { font-size: 11px; color: var(--ink-4); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.06em; }

/* ── BROWSE VIEW ── */
.browse-hero { padding: 44px 28px 12px; }
.browse-hero h2 { font-size: clamp(26px, 4vw, 38px); font-weight: 700; letter-spacing: -0.03em; margin-bottom: 6px; }

/* ── PRODUCT CARD ── */
.product-card {
  background: var(--base-2); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 18px 20px;
  cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
}
.product-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--amber), var(--amber-2)); opacity: 0; transition: opacity 0.2s; }
.product-card:hover { border-color: rgba(232,149,10,0.4); background: var(--base-3); box-shadow: var(--shadow-md); }
.product-card:hover::after { opacity: 1; }
.product-card.selected { border-color: var(--amber); background: var(--base-3); box-shadow: 0 0 0 1px var(--amber), var(--shadow-amber); }
.product-card.selected::after { opacity: 1; }
.pc-cat { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-4); margin-bottom: 6px; }
.pc-name { font-size: 16px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.02em; }
.pc-desc { font-size: 12px; color: var(--ink-3); line-height: 1.55; margin-bottom: 12px; }
.pc-check { position: absolute; top: 14px; right: 14px; width: 22px; height: 22px; border-radius: 50%; background: var(--amber); display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--base); font-weight: 700; }

/* ── CART STRIP ── */
.cart-strip { position: fixed; bottom: 0; left: 0; right: 0; z-index: 90; background: var(--base-3); border-top: 1px solid var(--border-2); padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; gap: 16px; backdrop-filter: blur(12px); box-shadow: 0 -8px 32px rgba(0,0,0,0.5); transform: translateY(100%); transition: transform 0.3s ease; }
.cart-strip.visible { transform: translateY(0); }
.cart-items-list { display: flex; gap: 8px; flex-wrap: wrap; flex: 1; }
.cart-item-tag { display: inline-flex; align-items: center; gap: 6px; background: var(--base-5); border: 1px solid var(--border); padding: 4px 10px; border-radius: 99px; font-size: 11.5px; }
.cart-item-tag button { background: none; border: none; color: var(--ink-4); cursor: pointer; font-size: 14px; line-height: 1; padding: 0; }
.cart-item-tag button:hover { color: var(--red); }

/* ── QUOTE BUILDER ── */
.quote-layout { display: grid; grid-template-columns: 1fr 300px; gap: 24px; align-items: start; }
.quote-box { background: var(--base-3); border: 1px solid var(--border-2); border-radius: var(--r-xl); padding: 22px; position: sticky; top: 74px; }
.quote-box-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-4); margin-bottom: 16px; }
.quote-line { display: flex; justify-content: space-between; align-items: center; font-size: 12.5px; padding: 5px 0; color: var(--ink-3); border-bottom: 1px solid var(--border); }
.quote-line:last-of-type { border-bottom: none; }
.quote-line span:last-child { color: var(--ink); font-weight: 600; }
.quote-total { display: flex; justify-content: space-between; align-items: baseline; font-size: 20px; font-weight: 700; padding-top: 14px; margin-top: 8px; border-top: 1px solid var(--border-2); color: var(--amber); letter-spacing: -0.02em; }
.quote-total span:first-child { font-size: 12px; font-weight: 400; color: var(--ink-4); }
.timeline-bar { height: 3px; background: var(--base-5); border-radius: 99px; margin: 8px 0; overflow: hidden; }
.timeline-fill { height: 100%; background: linear-gradient(90deg, var(--amber), var(--amber-2)); border-radius: 99px; transition: width 0.4s; }
.output-row { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.output-row:last-child { border-bottom: none; }
.output-check { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid var(--border-2); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; margin-top: 1px; background: var(--base-4); transition: all 0.15s; }
.output-check:hover { border-color: var(--amber); }
.output-check.checked { background: var(--amber); border-color: var(--amber); }
.output-check.required { background: var(--base-5); border-color: var(--border); cursor: default; }
.output-type-tag { display: inline-flex; align-items: center; padding: 1px 6px; border-radius: 3px; font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-left: 6px; }
.output-type-audio { background: rgba(74,158,255,0.15); color: #7ab8ff; }
.output-type-video { background: rgba(61,186,118,0.15); color: #5dd696; }
.output-type-social { background: rgba(167,139,250,0.15); color: #c4b5fd; }
.output-type-photo { background: rgba(251,146,60,0.15); color: #fdba74; }
.output-type-document { background: rgba(100,200,255,0.15); color: #93d4ff; }
.output-type-design { background: rgba(245,200,66,0.15); color: #f5c842; }
.output-type-strategy { background: rgba(232,149,10,0.15); color: var(--amber); }
.delivery-tag { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(232,149,10,0.15); }

/* ── SUCCESS ── */
.success-icon { width: 60px; height: 60px; border-radius: 50%; background: var(--amber); color: var(--base); font-size: 24px; font-weight: 700; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }

/* ── AI AREA ── */
.ai-area { border: 1px solid var(--border); border-radius: var(--r-lg); overflow: hidden; }
.ai-header { background: var(--base-4); padding: 12px 16px; font-size: 13px; font-weight: 600; color: var(--ink); display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); }
.ai-dot { width: 7px; height: 7px; background: var(--amber); border-radius: 50%; animation: pulse 2s infinite; }
.ai-body { padding: 16px; background: var(--base-2); }
.ai-result { background: var(--base-3); border-radius: var(--r-md); padding: 14px; margin-top: 14px; font-size: 13px; line-height: 1.7; border: 1px solid var(--border-2); }

/* ── WORKLOAD ── */
.workload-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 12.5px; }
.workload-bar-wrap { flex: 1; height: 4px; background: var(--base-5); border-radius: 99px; overflow: hidden; }
.workload-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--amber), var(--amber-2)); transition: width 0.5s; }
.scrollable { max-height: 420px; overflow-y: auto; padding-right: 4px; }
.add-form { background: var(--base-3); border-radius: var(--r-lg); padding: 20px; border: 1px solid var(--border); }
.project-card { background: var(--base-2); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 14px 18px; margin-bottom: 8px; }
.project-card .pname { font-weight: 700; font-size: 13.5px; margin-bottom: 3px; }
.project-card .pmeta { font-size: 11.5px; color: var(--ink-3); }

/* ── TEAMS ── */
.teams-hero { padding: 52px 28px 32px; text-align: center; }
.teams-hero h2 { font-size: clamp(30px, 5vw, 48px); font-weight: 700; letter-spacing: -0.03em; margin-bottom: 10px; }
.teams-hero p { color: var(--ink-3); font-size: 15px; max-width: 520px; margin: 0 auto 28px; line-height: 1.7; }
.teams-filter-bar { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; padding: 0 28px 28px; }

.portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-top: 14px; }

/* ── SUPPORT ── */

/* ── TEAM EDITOR ── */

/* ── MODAL ── */

.dash-tab.active { color:var(--amber);border-bottom-color:var(--amber);font-weight:700; }

/* ── PROJECT BOARD ── */

.project-title { font-size:24px;font-weight:700;letter-spacing:-0.03em;margin-bottom:4px; }

.project-tab { padding:12px 18px;font-size:13px;font-weight:500;color:var(--ink-3);cursor:pointer;border:none;background:transparent;font-family:'Space Grotesk',sans-serif;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.15s; }
.project-tab:hover { color:var(--ink); }
.project-tab.active { color:var(--amber);border-bottom-color:var(--amber);font-weight:700; }
.project-content { padding:24px 28px 48px; }

/* ── MILESTONES ── */
.milestone-timeline { position:relative;padding-left:28px; }
.milestone-timeline::before { content:'';position:absolute;left:9px;top:12px;bottom:12px;width:2px;background:var(--base-5); }
.milestone-item { position:relative;margin-bottom:20px; }
.milestone-dot { position:absolute;left:-28px;top:4px;width:18px;height:18px;border-radius:50%;border:2px solid var(--base-5);background:var(--base-3);display:flex;align-items:center;justify-content:center;font-size:9px;transition:all 0.3s;z-index:1; }
.milestone-dot.pending { border-color:var(--base-5);background:var(--base-3); }
.milestone-dot.in_progress { border-color:var(--amber);background:var(--base-3);box-shadow:0 0 8px rgba(232,149,10,0.4);animation:pulse 2s infinite; }
.milestone-dot.completed { border-color:var(--green);background:var(--green); }
.milestone-body { background:var(--base-2);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 16px;transition:border-color 0.2s; }
.milestone-body.in_progress { border-color:rgba(232,149,10,0.3); }

.milestone-title { font-size:13px;font-weight:700;margin-bottom:3px; }

.payment-method-btn:hover { border-color:var(--amber); }
.payment-method-btn.active { border-color:var(--amber);background:var(--amber-dim); }
.payment-method-btn .pm-icon { font-size:20px;display:block;margin-bottom:4px; }
.payment-method-btn .pm-label { font-size:11px;font-weight:700;color:var(--ink-3); }
.payment-method-btn.active .pm-label { color:var(--amber); }

/* ── TEAM INBOX ── */
.inbox-quote-card { background:var(--base-2);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 20px;margin-bottom:12px;transition:border-color 0.2s; }

/* ── OVERVIEW STATS ── */
.overview-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:20px; }
.overview-stat { background:var(--base-3);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 14px; }

.overview-stat .os-val { font-size:18px;font-weight:700;color:var(--ink);letter-spacing:-0.02em; }

/* ── EMPTY STATES ── */
.empty-state { text-align:center;padding:48px 20px;color:var(--ink-3); }
.empty-state-icon { font-size:36px;margin-bottom:12px;display:block;opacity:0.5; }
.empty-state-title { font-size:16px;font-weight:700;color:var(--ink-2);margin-bottom:6px; }
.empty-state-desc { font-size:13px;line-height:1.65;max-width:340px;margin:0 auto 20px; }

function fmt(n) { return 'KES ' + Math.round(n).toLocaleString(); }

function getMyTeam() {
  if (!state.currentUser || !state.currentUser.teamId) return null;
  return state.productionTeams.find(function(t){return t.id===state.currentUser.teamId;}) || null;
}

function getWorkload() {
  let h = 0;
  state.workloadItems.forEach(function(p){h+=p.hours||0;});
  return { totalHours:h, calDays:Math.ceil(h/(3*8)), pct:Math.min(100,Math.round((h/(3*8*20))*100)), count:state.workloadItems.length };
}

  var price=0, hours=0;
  state.cart.forEach(function(item){
    var t=state.templates.find(function(t){return t.id===item.templateId;});
    if (!t) return;
    t.outputs.forEach(function(o){if(o.required||item.outputs[o.id]){price+=o.price;hours+=o.hours*o.personnel;}});
  });
  return {price:price,hours:hours,days:Math.max(1,Math.ceil((hours/(3*8))*1.3))};
}

function calcItemTotal(item) {
  var t=state.templates.find(function(t){return t.id===item.templateId;});
  if (!t) return 0;
  return t.outputs.filter(function(o){return o.required||item.outputs[o.id];}).reduce(function(a,o){return a+o.price;},0);
}

function findBestTeam(occasions) {
  var specs=occasions.map(function(occ){var o=OCCASIONS.find(function(o){return o.id===occ;});return o?o.title:null;}).filter(Boolean);
  var best=null,bestScore=-1;
  state.productionTeams.filter(function(t){return t.availability!=='away';}).forEach(function(team){
    var score=team.specialties.filter(function(s){return specs.indexOf(s)>=0;}).length;
    if(score>bestScore){bestScore=score;best=team.id;}
  });
  return best;
}

function addToCart(templateId) {

  var t=state.templates.find(function(t){return t.id===templateId;});

  state.cart=state.cart.concat([{templateId:templateId,outputs:defaults,customNote:''}]);

}

function removeFromCart(templateId){state.cart=state.cart.filter(function(i){return i.templateId!==templateId;});render();}

function toggleCartOutput(templateId,outputId){

}

function submitQuote() {
  if (!state.currentUser) {
    setState({showAuth:true,authMode:'login',authQuoteGate:true});
    showToast('Sign in to submit your brief and track progress');
    return;
  }
  if (!state.quoteClient.trim()||!state.quoteEmail.trim()) { showToast('Please fill in your details'); return; }

  var q=calcCartTotal();
  var occasionsInCart=[...new Set(state.cart.map(function(item){
    var t=state.templates.find(function(t){return t.id===item.templateId;});
    if (!t) return null;
    var occ=Object.keys(OCCASION_MAP).find(function(occ){return OCCASION_MAP[occ].indexOf(t.category)>=0;});
    return occ||null;
  }).filter(Boolean))];

  var multiTeam=occasionsInCart.length>1;
  var suggestedTeamId=findBestTeam(occasionsInCart);

  var quote={
    id:'q-'+Date.now(),
    clientId:state.currentUser.id,
    clientName:state.quoteClient||state.currentUser.name,
    clientEmail:state.quoteEmail||state.currentUser.email,
    services:state.cart.map(function(item){return(PLAIN_NAMES[item.templateId]||{name:item.templateId}).name;}),
    occasions:occasionsInCart,
    totalPrice:q.price, totalDays:q.days,
    briefNote:state.quoteBrief,
    status:'submitted',
    createdAt:todayStr(),
    assignedTeamId:null,
    suggestedTeamId:suggestedTeamId,
    multiTeam:multiTeam,
    routingResolved:!multiTeam,
    routingChoice:null,
    declinedBy:[]
  };

  var updates={
    quotes:[quote].concat(state.quotes),
    cart:[],quoteClient:'',quoteEmail:'',quotePhone:'',quoteBrief:'',
    selectedOccasion:null,quoteStep:'browse',
    view:'client-dashboard',clientDashTab:'quotes'
  };
  if (multiTeam) { updates.showRoutingModal=true; updates.routingQuoteId=quote.id; }

  setState(updates);
  showToast('Brief submitted \u2713');
}

function resolveRouting(quoteId, choice) {
  var newQuotes=state.quotes.map(function(q){
    if(q.id!==quoteId)return q;
    return Object.assign({},q,{routingResolved:true,routingChoice:choice});
  });

}

// TEAM QUOTE INBOX ACTIONS
// ════════════════════════════════════════════
function acceptQuote(quoteId) {
  var quote=state.quotes.find(function(q){return q.id===quoteId;});
  if (!quote) return;
  var myTeam=getMyTeam();
  if (!myTeam) return;

  // Check out-of-specialty
  var teamSpecs=myTeam.specialties;
  var quoteSpecs=quote.occasions.map(function(occ){var o=OCCASIONS.find(function(o){return o.id===occ;});return o?o.title:null;}).filter(Boolean);
  var outOfSpec=quoteSpecs.filter(function(s){return teamSpecs.indexOf(s)<0;});

  // Build milestones
  var primaryOcc=quote.occasions[0]||'default';
  var tmpl=MILESTONE_TEMPLATES[primaryOcc]||MILESTONE_TEMPLATES['default'];
  var milestones=tmpl.map(function(title,i){return{id:'m'+(i+1),title:title,status:'pending',completedAt:null,note:''};});

  var project={
    id:'proj-'+Date.now(),
    quoteId:quoteId,
    clientId:quote.clientId,
    clientName:quote.clientName,
    teamId:myTeam.id,
    teamName:myTeam.name,
    title:quote.clientName+' \u2014 '+quote.services[0],
    services:quote.services,
    occasionId:primaryOcc,
    totalPrice:quote.totalPrice,
    status:'in_progress',
    milestones:milestones,
    outOfSpecAlert:outOfSpec.length>0?outOfSpec:null,
    createdAt:todayStr(),
    deliveredAt:null,confirmedAt:null,paidAt:null
  };

  var sysText='Project started. '+myTeam.name+' has accepted your brief for "'+quote.services.join(', ')+'". KES '+Math.round(quote.totalPrice).toLocaleString()+' held in escrow pending delivery.';
  if (outOfSpec.length>0) sysText+=' \u26A0\uFE0F Note: this brief includes '+outOfSpec.join(', ')+' — outside '+myTeam.name+'\'s listed specialties. Support has been notified.';

  var msgs=Object.assign({},state.messages);
  msgs[project.id]=[{id:'msg-sys-1',senderId:'system',senderName:'Frame & File',senderRole:'system',text:sysText,timestamp:nowTimeStr()}];

  var newQuotes=state.quotes.map(function(q){return q.id===quoteId?Object.assign({},q,{status:'accepted',assignedTeamId:myTeam.id}):q;});

  setState({quotes:newQuotes,projects:[project].concat(state.projects),messages:msgs,teamInboxTab:'active'});
  showToast('Quote accepted \u2014 project created \u2713');
}

function declineQuote(quoteId) {
  var myTeam=getMyTeam();if(!myTeam)return;
  var newQuotes=state.quotes.map(function(q){
    if(q.id!==quoteId)return q;
    return Object.assign({},q,{declinedBy:q.declinedBy.concat([myTeam.id])});
  });
  setState({quotes:newQuotes});
  showToast('Quote declined');
}

function updateMilestone(projectId, milestoneId, newStatus, note) {
  var projects=state.projects.map(function(p){
    if(p.id!==projectId)return p;
    var milestones=p.milestones.map(function(m){
      if(m.id!==milestoneId)return m;
      return Object.assign({},m,{status:newStatus,completedAt:newStatus==='completed'?todayStr():m.completedAt,note:note||m.note});
    });
    return Object.assign({},p,{milestones:milestones});
  });
  setState({projects:projects,milestoneNoteInput:''});
  showToast(newStatus==='completed'?'Milestone completed \u2713':'Milestone updated');
}

function markDelivered(projectId) {
  var projects=state.projects.map(function(p){

  var projects=state.projects.map(function(p){

  var msgs=Object.assign({},state.messages);

  if (ctx==='team-profile') back='<button class="btn sm ghost" onclick="setState({view:\'teams\'})">&#8592; Teams</button>';
  if (ctx==='support') back='<button class="btn sm ghost" onclick="setState({view:\'landing\'})">&#8592; Home</button>';
  if (ctx==='messages') back='<button class="btn sm ghost" onclick="setState({view:\'landing\'})">&#8592; Home</button>';

  return '<nav class="nav">'+logo+'<div style="display:flex;align-items:center;gap:8px">'+back+navLinks+cartBtn+userArea+'</div></nav>';
}

function renderRoutingModal() {
  if (!state.showRoutingModal) return '';

  if (!quote) return '';

  var occBreakdown=quote.occasions.map(function(occ){
    var o=OCCASIONS.find(function(o){return o.id===occ;});
    if (!o) return '';
    var bestTeam=state.productionTeams.find(function(t){return t.specialties.indexOf(o.title)>=0&&t.availability==='available';});
    return '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">'+
      '<span style="font-size:18px">'+o.icon+'</span>'+
      '<div style="flex:1"><div style="font-size:12.5px;font-weight:700">'+o.title+'</div></div>'+
      (bestTeam?'<span class="badge info" style="font-size:10px">'+bestTeam.name+'</span>':'<span class="badge neutral" style="font-size:10px">Matching\u2026</span>')+
      '</div>';
  }).join('');

  var options=[
    {id:'primary',icon:'&#9889;',title:'Assign to primary team',desc:'Best-matching team takes the full brief. They\'ll be alerted about the additional service and can flag if they need a specialist partner.'},
    {id:'split',icon:'&#9881;&#65039;',title:'Split across two teams',desc:'Each specialist team handles their area. You\'ll have two project threads in your dashboard — Frame &amp; File coordinates.'},
    {id:'manual',icon:'&#128197;',title:'Assign manually',desc:'Review both teams\' profiles and choose yourself. Brief will stay pending until you assign it.'}
  ];

  var optHtml=options.map(function(opt){
    var sel=state.routingSelected===opt.id;
    return '<div class="routing-option '+(sel?'selected':'')+'" onclick="state.routingSelected=\''+opt.id+'\';render()">'+
      '<div style="display:flex;align-items:flex-start;gap:10px">'+

    '<div class="modal-box" style="max-width:520px">'+
    '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--amber);margin-bottom:8px">&#9889; Multi-specialty brief</div>'+

    '<button class="btn ghost" onclick="setState({showRoutingModal:false})" style="color:var(--ink-3)">Later</button>'+
    '</div></div></div>';
}

// BROWSE — OCCASION-FIRST CLIENT FLOW
// ════════════════════════════════════════════
function renderBrowse() {
  const occ = OCCASIONS.find(function(o){return o.id===state.selectedOccasion;}) || OCCASIONS[0];
  const categories = OCCASION_MAP[occ.id] || [];
  const filtered = state.templates.filter(function(t){ return categories.indexOf(t.category)>=0; });

  const occasionTabs = OCCASIONS.map(function(o){
    return '<button class="chip '+(state.selectedOccasion===o.id?'active':'')+'" onclick="setState({selectedOccasion:\''+o.id+'\'})" style="font-size:11px">'+o.icon+' '+o.title+'</button>';
  }).join('');

  const cards = filtered.map(function(t) {
    const plain = PLAIN_NAMES[t.id] || {name:t.name, desc:t.description};
    const basePrice = t.outputs.filter(function(o){return o.required;}).reduce(function(a,o){return a+o.price;},0);
    const inCart = !!state.cart.find(function(i){return i.templateId===t.id;});
    return '<div class="product-card '+(inCart?'selected':'')+'" onclick="addToCart(\''+t.id+'\')">' +
      (inCart?'<div class="pc-check">&#10003;</div>':'') +
      '<div class="pc-cat">'+t.category+(t.subcategory?' &middot; '+t.subcategory:'')+'</div>' +
      '<div class="pc-name">'+plain.name+'</div>' +
      '<div class="pc-desc">'+plain.desc+'</div>' +
      '<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">' +
      '<span class="tag" style="color:var(--amber)">From '+fmt(basePrice)+'</span>' +
      '<span class="tag">'+t.outputs.length+' outputs</span>' +
      '<span class="tag">'+t.baseTimeline+'+ days</span>' +
      '</div></div>';
  }).join('');

  const cartStrip = state.cart.length > 0 ? (
    '<div class="cart-strip visible">' +
    '<div class="cart-items-list">' +
    state.cart.map(function(item){
      const plain = PLAIN_NAMES[item.templateId] || {name:item.templateId};
      return '<div class="cart-item-tag"><span>'+plain.name+'</span><span style="color:var(--amber);font-size:11px;margin:0 2px">'+fmt(calcItemTotal(item))+'</span><button onclick="removeFromCart(\''+item.templateId+'\')">&#215;</button></div>';
    }).join('') +
    '</div>' +
    '<div style="display:flex;gap:10px;align-items:center;flex-shrink:0">' +
    '<div style="text-align:right"><div style="font-size:11px;color:var(--ink-4)">Total estimate</div><div style="font-size:18px;font-weight:700;color:var(--amber);letter-spacing:-0.02em">'+fmt(calcCartTotal().price)+'</div></div>' +
    '<button class="btn primary" onclick="setState({view:\'quote\',quoteStep:\'configure\'})">Review &amp; quote &rarr;</button>' +
    '</div></div>'
  ) : '<div class="cart-strip"></div>';

  return renderNav('browse') + renderAuthOverlay() +
    '<div class="browse-hero reveal">' +
    '<h2>'+occ.icon+' '+occ.title+'</h2>' +
    '<p style="color:var(--ink-3);font-size:13px;margin-bottom:16px">'+occ.desc+' Select what you need &mdash; add multiple services to one quote.</p>' +
    '<div class="chips-row" style="margin-bottom:0">'+occasionTabs+'</div></div>' +
    '<div style="padding:20px 28px 100px;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px">'+cards+'</div>' +
    cartStrip;
}

// ════════════════════════════════════════════
// QUOTE — CONFIGURE + CONTACT
// ════════════════════════════════════════════
function renderQuote() {
  if (state.quoteStep==='configure') return renderQuoteConfigure();
  return renderQuoteContact();
}

function renderQuoteConfigure() {
  if (state.cart.length===0) return renderBrowse();

  const sections = state.cart.map(function(item) {
    const t = state.templates.find(function(t){return t.id===item.templateId;});
    if (!t) return '';
    const plain = PLAIN_NAMES[t.id]||{name:t.name};
    const itemTotal = calcItemTotal(item);

    const outputs = t.outputs.map(function(o){
      const checked = item.outputs[o.id];
      const mark = (checked||o.required)?'<svg width="10" height="10" viewBox="0 0 10 10"><path d="M2 5l2.5 2.5L8 3" stroke="'+(o.required?'var(--ink-4)':'var(--base)')+'" stroke-width="1.8" fill="none" stroke-linecap="round"/></svg>':'';
      return '<div class="output-row">' +
        '<div class="output-check '+(o.required?'required':(checked?'checked':''))+'" onclick="toggleCartOutput(\''+t.id+'\',\''+o.id+'\')">'+mark+'</div>' +
        '<div style="flex:1"><div style="font-size:13px;font-weight:600">'+o.name+outputTypeTag(o.type||'video')+(o.required?'<span style="font-size:10px;color:var(--ink-4);font-weight:400;margin-left:5px">(included)</span>':'')+'</div><div style="font-size:12px;color:var(--ink-3)">'+o.description+'</div></div>' +
        '<div style="text-align:right;flex-shrink:0"><div style="font-size:13px;font-weight:700">'+fmt(o.price)+'</div><div style="font-size:10.5px;color:var(--ink-4)">'+o.hours+'h &middot; '+o.personnel+'p</div></div></div>';
    }).join('');

    return '<div class="card" style="margin-bottom:18px">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">' +
      '<div><div style="font-size:16px;font-weight:700;letter-spacing:-0.02em">'+plain.name+'</div><div style="font-size:12px;color:var(--ink-3)">'+t.category+' &middot; '+t.baseTimeline+'+ days</div></div>' +
      '<div style="display:flex;align-items:center;gap:8px">' +
      '<div style="font-size:15px;font-weight:700;color:var(--amber)">'+fmt(itemTotal)+'</div>' +
      '<button class="btn sm danger" onclick="removeFromCart(\''+t.id+'\')">Remove</button></div></div>' +
      outputs + '</div>';
  }).join('');

  const total = calcCartTotal();
  return renderNav('quote') + renderAuthOverlay() +
    '<div class="section" style="max-width:860px;margin:0 auto">' +
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">' +
    '<div><div class="section-title">Your production brief</div><div class="section-sub">Toggle off outputs you don\'t need. Add more services below.</div></div>' +
    '<button class="btn ghost" onclick="setState({view:\'browse\'})" style="color:var(--ink-3);font-size:12px">+ Add more services</button></div>' +
    sections +
    '<div style="background:var(--base-3);border:1px solid var(--border-2);border-radius:var(--r-lg);padding:18px 22px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">' +
    '<div><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-4);margin-bottom:4px">Estimated total</div>' +
    '<div style="font-size:28px;font-weight:700;color:var(--amber);letter-spacing:-0.03em">'+fmt(total.price)+'</div>' +
    '<div style="font-size:12px;color:var(--ink-3)">'+total.days+' working days &middot; '+total.hours+' person-hours</div></div>' +
    '<button class="btn primary" style="padding:12px 28px;font-size:14px" onclick="setState({quoteStep:\'contact\'})">Request this quote &rarr;</button>' +
    '</div></div>';
}

function renderQuoteContact() {
  const total = calcCartTotal();
  const itemsList = state.cart.map(function(item){
    const plain = PLAIN_NAMES[item.templateId]||{name:item.templateId};
    return '<div class="quote-line"><span>'+plain.name+'</span><span>'+fmt(calcItemTotal(item))+'</span></div>';
  }).join('');
  return renderNav('quote') + renderAuthOverlay() +
    '<div class="section" style="max-width:760px;margin:0 auto">' +
    '<div class="section-title">Almost done</div>' +
    '<div class="section-sub">Tell us who you are and we\'ll send your brief to matched production teams.</div>' +
    '<div class="quote-layout">' +
    '<div class="card">' +

function renderClientDashboard() {
  var user=state.currentUser;
  if (!user) return renderNav('client-dashboard')+renderAuthOverlay()+'<div class="section"><div class="empty-state"><span class="empty-state-icon">&#128274;</span><div class="empty-state-title">Sign in to view your projects</div><div class="empty-state-desc">Track your submitted briefs, active projects, and payment history.</div><button class="btn primary" onclick="setState({showAuth:true,authMode:\'login\'})">Sign in</button></div></div>';

  var myProjects=state.projects.filter(function(p){return p.clientId===user.id&&p.status!=='paid';});
  var myQuotes=state.quotes.filter(function(q){return q.clientId===user.id&&q.status==='submitted';});
  var completed=state.projects.filter(function(p){return p.clientId===user.id&&p.status==='paid';});

  var tabs=[
    {id:'active',label:'Active projects ('+myProjects.length+')'},
    {id:'quotes',label:'Submitted briefs ('+myQuotes.length+')'},
    {id:'completed',label:'Completed ('+completed.length+')'}
  ];

  var tabHtml='<div class="dash-tabs">'+tabs.map(function(t){return '<button class="dash-tab '+(state.clientDashTab===t.id?'active':'')+'" onclick="setState({clientDashTab:\''+t.id+'\'})">'+t.label+'</button>';}).join('')+'</div>';

  var body='';

  if (state.clientDashTab==='active') {
    if (!myProjects.length) {
      body='<div class="empty-state"><span class="empty-state-icon">&#128197;</span><div class="empty-state-title">No active projects yet</div><div class="empty-state-desc">Once a team accepts your brief, your project will appear here with a live progress board.</div><button class="btn primary" onclick="setState({view:\'browse\'})">Browse services</button></div>';
    } else {
      body=myProjects.map(function(p){
        var pct=projectProgress(p);
        var sm=statusMeta(p.status);
        var currentM=p.milestones.find(function(m){return m.status==='in_progress';})||p.milestones.find(function(m){return m.status==='pending';});
        var unread=(state.messages[p.id]||[]).filter(function(m){return m.senderRole==='team';}).length;
        return '<div class="brief-card clickable" onclick="setState({view:\'project\',activeProjectId:\''+p.id+'\',projectTab:\'overview\'})">' +
          '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">' +
          '<div style="flex:1"><div style="font-size:15px;font-weight:700;letter-spacing:-0.02em;margin-bottom:3px">'+p.title+'</div>' +
          '<div style="font-size:12px;color:var(--ink-3)">'+p.teamName+' &middot; '+p.services.join(', ')+'</div></div>' +
          '<div style="display:flex;gap:6px;align-items:center;flex-shrink:0">' +
          (p.status==='delivered'?'<span class="badge" style="background:rgba(139,92,246,0.12);color:#a78bfa;animation:pulse 2s infinite">&#9889; Action needed</span>':'')+
          '<span class="brief-status '+sm.cls+'">'+sm.label+'</span></div></div>' +
          '<div class="progress-track"><div class="progress-fill" style="width:'+pct+'%"></div></div>' +
          '<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--ink-4);margin-bottom:10px">' +
          '<span>'+pct+'% complete &middot; '+(currentM?'Current: '+currentM.title:'All done')+'</span>' +
          '<span>'+fmt(p.totalPrice)+'</span></div>' +
          '<div style="display:flex;gap:6px;flex-wrap:wrap">' +
          '<button class="btn sm" onclick="event.stopPropagation();setState({view:\'project\',activeProjectId:\''+p.id+'\',projectTab:\'milestones\'})">View progress</button>' +
          '<button class="btn sm" onclick="event.stopPropagation();setState({view:\'project\',activeProjectId:\''+p.id+'\',projectTab:\'messages\'})">Messages'+(unread>0?' <span style="background:var(--amber);color:var(--base);padding:0 5px;border-radius:99px;font-size:9px;font-weight:800">'+unread+'</span>':'')+'</button>' +
          (p.status==='delivered'?'<button class="btn sm primary" onclick="event.stopPropagation();confirmDelivery(\''+p.id+'\')">&#10003; Confirm delivery</button>':'')+
          '</div></div>';
      }).join('');
    }
  }

  if (state.clientDashTab==='quotes') {
    if (!myQuotes.length) {
      body='<div class="empty-state"><span class="empty-state-icon">&#128203;</span><div class="empty-state-title">No pending briefs</div><div class="empty-state-desc">Briefs you submit will appear here while awaiting team acceptance.</div><button class="btn primary" onclick="setState({view:\'browse\'})">Submit a brief</button></div>';
    } else {
      body=myQuotes.map(function(q){
        var suggested=q.suggestedTeamId?state.productionTeams.find(function(t){return t.id===q.suggestedTeamId;}):null;
        return '<div class="brief-card">' +
          '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">' +
          '<div><div style="font-size:15px;font-weight:700;letter-spacing:-0.02em;margin-bottom:3px">'+q.services.join(' + ')+'</div>' +
          '<div style="font-size:12px;color:var(--ink-3)">Submitted '+q.createdAt+' &middot; '+fmt(q.totalPrice)+'</div></div>' +
          '<span class="brief-status submitted">Awaiting team</span></div>' +
          (q.briefNote?'<div style="font-size:12.5px;color:var(--ink-2);margin-bottom:10px;line-height:1.6;padding:10px 12px;background:var(--base-3);border-radius:var(--r-sm)">'+q.briefNote.slice(0,180)+(q.briefNote.length>180?'\u2026':'')+'</div>':'')+
          (q.multiTeam&&!q.routingResolved?'<div class="alert-banner"><span>&#9889;</span><span>Multi-specialty brief &mdash; routing not yet confirmed. <a onclick="setState({showRoutingModal:true,routingQuoteId:\''+q.id+'\'})" style="color:var(--amber);cursor:pointer;font-weight:700">Assign now &rarr;</a></span></div>':'')+
          (suggested?'<div style="font-size:12px;color:var(--ink-3)">Suggested team: <strong style="color:var(--ink)">'+suggested.name+'</strong> &middot; '+renderStars(suggested.rating,11)+' '+suggested.rating+'</div>':'')+
          '</div>';
      }).join('');
    }
  }

  if (state.clientDashTab==='completed') {
    if (!completed.length) {
      body='<div class="empty-state"><span class="empty-state-icon">&#9989;</span><div class="empty-state-title">No completed projects yet</div><div class="empty-state-desc">Paid and delivered projects will appear here.</div></div>';
    } else {
      body=completed.map(function(p){
        var team=state.productionTeams.find(function(t){return t.id===p.teamId;});
        return '<div class="brief-card clickable" onclick="setState({view:\'project\',activeProjectId:\''+p.id+'\',projectTab:\'overview\'})">' +
          '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">' +
          '<div><div style="font-size:15px;font-weight:700;letter-spacing:-0.02em">'+p.title+'</div>' +
          '<div style="font-size:12px;color:var(--ink-3)">'+p.teamName+' &middot; Paid '+p.paidAt+'</div></div>' +
          '<span class="brief-status paid">Paid</span></div>' +
          '<div style="font-size:13px;color:var(--amber);font-weight:700;margin-bottom:10px">'+fmt(p.totalPrice)+'</div>' +
          (team?'<button class="btn sm outline-amber" onclick="event.stopPropagation();openRatingModal(\''+team.id+'\')">Leave a review</button>':'')+
          '</div>';
      }).join('');
    }
  }

  return renderNav('client-dashboard')+renderAuthOverlay()+renderRoutingModal()+renderPaymentModal()+renderPostPayReview()+renderRatingModal()+
    '<div style="padding:28px 28px 0">' +
    '<div class="section-title">My Projects</div>' +
    '<div style="font-size:13px;color:var(--ink-3);margin-bottom:16px">Welcome back, '+user.name.split(' ')[0]+'. Here\'s everything in motion.</div>' +
    '</div>' +
    '<div style="padding:0 28px">'+tabHtml+'</div>' +
    '<div class="section" style="padding-top:0">'+body+'</div>';
}

function renderProject() {
  var project=state.projects.find(function(p){return p.id===state.activeProjectId;});
  if (!project) return renderClientDashboard();
  var isTeam=state.currentUser&&state.currentUser.role==='team'&&state.currentUser.teamId===project.teamId;
  var sm=statusMeta(project.status);
  var pct=projectProgress(project);
  var team=state.productionTeams.find(function(t){return t.id===project.teamId;});
  var backCtx=isTeam?'team':'client-dashboard';
  var backFn=isTeam?"setState({view:'team',teamTab:'inbox',teamInboxTab:'active'})":"setState({view:'client-dashboard',clientDashTab:'active'})";

  var tabs=[
    {id:'overview',label:'Overview'},
    {id:'milestones',label:'Milestones'},
    {id:'messages',label:'Messages'},
    {id:'payment',label:'Payment'}
  ];
  var tabHtml='<div class="project-tabs">'+tabs.map(function(t){return '<button class="project-tab '+(state.projectTab===t.id?'active':'')+'" onclick="setState({projectTab:\''+t.id+'\'})">'+t.label+'</button>';}).join('')+'</div>';

  var outOfSpecBanner=project.outOfSpecAlert?'<div class="alert-banner" style="margin-bottom:18px"><span>&#9888;&#65039;</span><div>This brief includes <strong>'+project.outOfSpecAlert.join(', ')+'</strong> \u2014 outside your listed specialties. Frame &amp; File support has been notified. Please confirm you can deliver or flag for a specialist partner.</div></div>':'';

  var content='';

  if (state.projectTab==='overview') {
    content=outOfSpecBanner+
      '<div class="overview-grid">' +
      '<div class="overview-stat"><div class="os-label">Status</div><div class="os-val" style="font-size:14px"><span class="brief-status '+sm.cls+'">'+sm.label+'</span></div></div>' +
      '<div class="overview-stat"><div class="os-label">Value</div><div class="os-val" style="color:var(--amber)">'+fmt(project.totalPrice)+'</div></div>' +
      '<div class="overview-stat"><div class="os-label">Progress</div><div class="os-val">'+pct+'%</div></div>' +
      '<div class="overview-stat"><div class="os-label">Started</div><div class="os-val" style="font-size:14px">'+project.createdAt+'</div></div>' +
      '</div>' +
      '<div class="progress-track" style="height:5px;margin-bottom:20px"><div class="progress-fill" style="width:'+pct+'%"></div></div>' +
      '<div class="grid-2" style="align-items:start">' +
      '<div class="card"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-4);margin-bottom:10px">Project details</div>' +
      '<div style="font-size:12.5px;color:var(--ink-3);margin-bottom:4px">Services</div><div style="font-size:13px;color:var(--ink);margin-bottom:12px">'+project.services.join(', ')+'</div>' +
      '<div style="font-size:12.5px;color:var(--ink-3);margin-bottom:4px">Production team</div>' +
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">' +
      (team?'<div style="width:32px;height:32px;border-radius:8px;background:'+team.accentColor+';display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--base);font-weight:800">'+team.initials+'</div><div><div style="font-size:13px;font-weight:700">'+team.name+'</div><div style="font-size:11px;color:var(--ink-3)">'+renderStars(team.rating,11)+' '+team.rating+'</div></div>':'<div style="font-size:13px">'+project.teamName+'</div>') +
      '</div>' +
      '<div style="font-size:12.5px;color:var(--ink-3);margin-bottom:4px">Milestones</div>' +
      '<div>'+project.milestones.map(function(m){var dot=m.status==='completed'?'&#10003;':m.status==='in_progress'?'\u25CF':'\u25CB';var c=m.status==='completed'?'var(--green)':m.status==='in_progress'?'var(--amber)':'var(--ink-4)';return '<div style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px"><span style="color:'+c+';font-size:11px">'+dot+'</span><span style="color:'+(m.status==='pending'?'var(--ink-4)':'var(--ink)')+'">'+m.title+'</span></div>';}).join('')+'</div>' +
      '</div>' +
      '<div class="card"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-4);margin-bottom:10px">Actions</div>' +
      (isTeam&&project.status==='in_progress'?'<button class="btn primary" style="width:100%;justify-content:center;margin-bottom:8px" onclick="markDelivered(\''+project.id+'\')">Mark as delivered &rarr;</button>':'')+
      (isTeam?'<button class="btn" style="width:100%;justify-content:center;margin-bottom:8px" onclick="setState({projectTab:\'milestones\'})">Update milestones</button>':'')+
      (!isTeam&&project.status==='delivered'?'<div style="background:rgba(232,149,10,0.1);border:1px solid rgba(232,149,10,0.2);border-radius:var(--r-md);padding:12px;margin-bottom:10px"><div style="font-size:13px;font-weight:700;color:var(--amber);margin-bottom:4px">Delivery ready for review</div><div style="font-size:12px;color:var(--ink-3);margin-bottom:10px">Your production team has marked this project as complete. Review and confirm to release payment.</div><button class="btn primary" style="width:100%;justify-content:center" onclick="confirmDelivery(\''+project.id+'\')">Confirm &amp; pay &rarr;</button></div>':'')+
      '<button class="btn ghost" style="width:100%;justify-content:center;color:var(--ink-3)" onclick="setState({projectTab:\'messages\'})">Open messages</button>' +
      '</div></div>';
  }

  if (state.projectTab==='milestones') {
    var mlHtml='<div class="milestone-timeline">'+project.milestones.map(function(m,i){
      var isPending=m.status==='pending';
      var isIP=m.status==='in_progress';
      var isDone=m.status==='completed';
      var dotClass=isDone?'completed':isIP?'in_progress':'pending';
      var dotInner=isDone?'<span style="color:var(--base);font-size:9px;font-weight:800">&#10003;</span>':'';
      var teamActions=isTeam?(
        '<div class="milestone-actions">'+
        (isPending?'<button class="btn sm" onclick="updateMilestone(\''+project.id+'\',\''+m.id+'\',\'in_progress\',\'\')">Start</button>':'')+
        (isIP?'<button class="btn sm primary" onclick="updateMilestone(\''+project.id+'\',\''+m.id+'\',\'completed\',state.milestoneNoteInput)">Mark complete</button>':'')+
        (isIP?'<input placeholder="Add a note (optional)\u2026" style="flex:1;font-size:11.5px;padding:5px 8px;background:var(--base-3);border:1px solid var(--border-2);border-radius:var(--r-sm);color:var(--ink)" oninput="state.milestoneNoteInput=this.value" />':'')+
        '</div>'
      ):'';
      return '<div class="milestone-item"><div class="milestone-dot '+dotClass+'">'+dotInner+'</div>'+
        '<div class="milestone-body '+m.status+'">'+
        '<div style="display:flex;justify-content:space-between;align-items:flex-start">' +
        '<div class="milestone-title">'+m.title+'</div>' +
        '<span class="badge '+(isDone?'success':isIP?'amber':'neutral')+'" style="font-size:9px;flex-shrink:0">'+(isDone?'Done':isIP?'In progress':'Pending')+'</span></div>' +
        (isDone&&m.completedAt?'<div class="milestone-sub">Completed '+m.completedAt+'</div>':'')+
        (m.note?'<div class="milestone-note">'+m.note+'</div>':'')+
        teamActions+'</div></div>';
    }).join('')+'</div>';
    content=outOfSpecBanner+mlHtml;
  }

  if (state.projectTab==='messages') {
    var thread=state.messages[project.id]||[];
    var bubbles=thread.map(function(msg){
      var isMe=state.currentUser&&msg.senderId===state.currentUser.id;
      var isSys=msg.senderRole==='system';
      if (isSys) return '<div class="chat-msg system-msg"><div class="chat-bubble">&#128274; '+msg.text+'</div><div class="chat-meta">'+msg.timestamp+'</div></div>';
      var cls=isMe?'from-me':'from-other';
      return '<div class="chat-msg '+cls+'">'+(isMe?'':'<div class="chat-sender">'+msg.senderName+'</div>') +
        '<div class="chat-bubble">'+msg.text+'</div>'+
        '<div class="chat-meta">'+msg.timestamp+'</div></div>';
    }).join('');
    content='<div class="chat-wrap">' +
      '<div class="chat-header"><div style="width:8px;height:8px;background:var(--green);border-radius:50%"></div>'+project.title+'</div>'+
      '<div class="chat-thread" id="chat-thread-'+project.id+'">'+bubbles+'</div>'+
      '<div class="chat-composer">'+
      '<input placeholder="Message '+(isTeam?project.clientName:project.teamName)+'\u2026" value="'+state.newMessage+'" oninput="state.newMessage=this.value" onkeydown="if(event.key===\'Enter\')sendMessage(\''+project.id+'\')" />'+
      '<button onclick="sendMessage(\''+project.id+'\')">Send</button>'+
      '</div></div>';
    // Scroll chat to bottom
    setTimeout(function(){var el=document.getElementById('chat-thread-'+project.id);if(el)el.scrollTop=el.scrollHeight;},60);
  }

  if (state.projectTab==='payment') {
    var payStatuses=['submitted','accepted','in_progress','delivered','confirmed','paid'];
    var curIdx=payStatuses.indexOf(project.status);
    var steps=[
      {label:'Brief submitted',icon:'&#128203;',done:curIdx>=0},
      {label:'Team accepted',icon:'&#129309;',done:curIdx>=1},
      {label:'In production',icon:'&#127916;',done:curIdx>=2},
      {label:'Delivered',icon:'&#128230;',done:curIdx>=3},
      {label:'Confirmed',icon:'&#9989;',done:curIdx>=4},
      {label:'Paid',icon:'&#128184;',done:curIdx>=5}
    ];
    var stepsHtml='<div style="display:flex;align-items:flex-start;gap:0;margin-bottom:24px;overflow-x:auto;padding-bottom:8px">'+steps.map(function(s,i){
      return '<div style="flex:1;text-align:center;min-width:80px">'+
        '<div style="width:36px;height:36px;border-radius:50%;background:'+(s.done?'var(--amber)':'var(--base-5)')+';display:flex;align-items:center;justify-content:center;font-size:'+(s.done?'16':'14')+'px;margin:0 auto 6px;border:2px solid '+(s.done?'var(--amber)':'var(--border)')+';transition:all 0.3s">'+s.icon+'</div>'+
        '<div style="font-size:10px;font-weight:'+(s.done?'700':'400')+';color:'+(s.done?'var(--ink)':'var(--ink-4)')+'">'+s.label+'</div>'+
        '</div>'+(i<steps.length-1?'<div style="flex-shrink:0;padding-top:18px;color:var(--ink-4);font-size:12px">&rarr;</div>':'');
    }).join('')+'</div>';

    var escrowCard='<div class="card" style="margin-bottom:16px">'+
      '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-4);margin-bottom:14px">Escrow status</div>'+
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
      '<span style="font-size:13px;color:var(--ink-3)">Amount held</span><span style="font-size:18px;font-weight:700;color:var(--amber)">'+fmt(project.totalPrice)+'</span></div>'+
      (project.status==='paid'?'<div style="font-size:13px;color:var(--green);font-weight:700">&#10003; Released to '+project.teamName+' on '+project.paidAt+'</div>':
        project.status==='confirmed'?'<div style="font-size:13px;color:var(--amber)">Delivery confirmed. Ready to release.</div>':
        '<div style="font-size:12px;color:var(--ink-3)">Held until delivery is confirmed by client.</div>')+
      '</div>';

    var payAction=!isTeam&&project.status==='delivered'?
      '<div style="margin-top:14px"><button class="btn primary" style="width:100%;justify-content:center" onclick="confirmDelivery(\''+project.id+'\')">Confirm delivery &amp; pay &rarr;</button></div>':'';
    var teamAction=isTeam&&project.status==='in_progress'?
      '<div style="margin-top:14px"><button class="btn primary" style="width:100%;justify-content:center" onclick="markDelivered(\''+project.id+'\')">Mark project as delivered &rarr;</button></div>':'';

    content=stepsHtml+escrowCard+payAction+teamAction+renderPaymentModal();
  }

  var heading=isTeam?renderNav('team')+renderAuthOverlay():renderNav('project')+renderAuthOverlay();
  return heading+renderPostPayReview()+renderRatingModal()+
    '<div class="project-board-header">' +
    '<button class="btn sm ghost" style="color:var(--ink-3);margin-bottom:16px;font-size:12px" onclick="'+backFn+'">&#8592; '+(isTeam?'Inbox':'My Projects')+'</button>'+
    '<div class="project-title">'+project.title+'</div>' +
    '<div class="project-meta-row">' +
    '<span class="brief-status '+sm.cls+'">'+sm.label+'</span>' +
    '<span style="font-size:12px;color:var(--ink-4)">'+project.teamName+'</span>' +
    '<span style="font-size:12px;color:var(--ink-4)">&middot;</span>' +
    '<span style="font-size:12px;color:var(--amber);font-weight:700">'+fmt(project.totalPrice)+'</span>' +
    '<span style="font-size:12px;color:var(--ink-4)">&middot;</span>' +
    '<span style="font-size:12px;color:var(--ink-4)">'+pct+'% complete</span>' +
    '</div></div>' +
    tabHtml +
    '<div class="project-content">'+content+'</div>';

// ════════════════════════════════════════════
// TEAM INBOX (rendered as team tab)
// ════════════════════════════════════════════
function renderTeamInbox() {
  var myTeam=getMyTeam();
  if (!myTeam) return '<div class="empty-state"><span class="empty-state-icon">&#128274;</span><div class="empty-state-title">No team linked</div><div class="empty-state-desc">Your account isn\'t linked to a production team profile.</div></div>';

  var pending=state.quotes.filter(function(q){
    return q.status==='submitted'&&(q.suggestedTeamId===myTeam.id||q.assignedTeamId===myTeam.id)&&q.declinedBy.indexOf(myTeam.id)<0;
  });
  var activeProjs=state.projects.filter(function(p){return p.teamId===myTeam.id&&p.status!=='paid';});
  var completedProjs=state.projects.filter(function(p){return p.teamId===myTeam.id&&p.status==='paid';});

  var tabs=[
    {id:'pending',label:'Pending quotes ('+pending.length+')'},
    {id:'active',label:'Active projects ('+activeProjs.length+')'},
    {id:'completed',label:'Completed ('+completedProjs.length+')'}
  ];
  var tabHtml='<div class="dash-tabs">'+tabs.map(function(t){return '<button class="dash-tab '+(state.teamInboxTab===t.id?'active':'')+'" onclick="setState({teamInboxTab:\''+t.id+'\'})">'+t.label+'</button>';}).join('')+'</div>';

  var body='';

  if (state.teamInboxTab==='pending') {
    if (!pending.length) {
      body='<div class="empty-state"><span class="empty-state-icon">&#128235;</span><div class="empty-state-title">No pending quotes</div><div class="empty-state-desc">When clients submit briefs matching your specialties, they\'ll appear here.</div></div>';
    } else {
      body=pending.map(function(q){
        var teamSpecs=myTeam.specialties;
        var quoteSpecs=q.occasions.map(function(occ){var o=OCCASIONS.find(function(o){return o.id===occ;});return o?o.title:null;}).filter(Boolean);
        var outOfSpec=quoteSpecs.filter(function(s){return teamSpecs.indexOf(s)<0;});
        return '<div class="inbox-quote-card '+(outOfSpec.length>0?'has-alert':'')+'">' +
          (outOfSpec.length>0?'<div class="alert-banner"><span>&#9888;&#65039;</span><div>This brief includes <strong>'+outOfSpec.join(', ')+'</strong> — not in your listed specialties. Confirm you can deliver before accepting, or decline and let another team pick it up.</div></div>':'')+
          '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">' +
          '<div><div style="font-size:15px;font-weight:700;letter-spacing:-0.02em;margin-bottom:3px">'+q.services.join(' + ')+'</div>' +
          '<div style="font-size:12px;color:var(--ink-3)">'+q.clientName+' &middot; '+q.createdAt+'</div></div>' +
          '<div style="text-align:right;flex-shrink:0"><div style="font-size:18px;font-weight:700;color:var(--amber)">'+fmt(q.totalPrice)+'</div><div style="font-size:11px;color:var(--ink-4)">'+q.totalDays+' days</div></div></div>' +
          (q.briefNote?'<div style="font-size:12.5px;color:var(--ink-2);margin-bottom:12px;padding:10px 12px;background:var(--base-3);border-radius:var(--r-sm);line-height:1.6;border-left:3px solid var(--border-2)">'+q.briefNote.slice(0,220)+(q.briefNote.length>220?'\u2026':'')+'</div>':'')+
          '<div style="display:flex;gap:8px;flex-wrap:wrap">' +
          '<button class="btn sm primary" onclick="acceptQuote(\''+q.id+'\')">Accept &amp; start project &rarr;</button>' +
          '<button class="btn sm danger" onclick="declineQuote(\''+q.id+'\')">Decline</button>' +
          q.occasions.map(function(occ){var o=OCCASIONS.find(function(o){return o.id===occ;});return o?'<span class="spec-tag" style="font-size:10px">'+o.icon+' '+o.title+'</span>':'';}).join('')+
          '</div></div>';
      }).join('');
    }
  }

  if (state.teamInboxTab==='active') {
    if (!activeProjs.length) {
      body='<div class="empty-state"><span class="empty-state-icon">&#128197;</span><div class="empty-state-title">No active projects</div><div class="empty-state-desc">Accept a quote to create your first project.</div></div>';
    } else {
      body=activeProjs.map(function(p){
        var pct=projectProgress(p);var sm=statusMeta(p.status);
        var unread=(state.messages[p.id]||[]).filter(function(m){return m.senderRole==='client';}).length;
        return '<div class="brief-card clickable" onclick="setState({view:\'project\',activeProjectId:\''+p.id+'\',projectTab:\'overview\'})">' +
          '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">' +
          '<div><div style="font-size:15px;font-weight:700;letter-spacing:-0.02em;margin-bottom:3px">'+p.title+'</div>' +
          '<div style="font-size:12px;color:var(--ink-3)">'+p.clientName+' &middot; '+p.services.join(', ')+'</div></div>' +
          '<span class="brief-status '+sm.cls+'">'+sm.label+'</span></div>' +
          '<div class="progress-track"><div class="progress-fill" style="width:'+pct+'%"></div></div>' +
          '<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--ink-4);margin-bottom:10px"><span>'+pct+'% complete</span><span>'+fmt(p.totalPrice)+'</span></div>' +
          '<div style="display:flex;gap:6px">' +
          '<button class="btn sm" onclick="event.stopPropagation();setState({view:\'project\',activeProjectId:\''+p.id+'\',projectTab:\'milestones\'})">Update milestones</button>' +
          '<button class="btn sm" onclick="event.stopPropagation();setState({view:\'project\',activeProjectId:\''+p.id+'\',projectTab:\'messages\'})">Messages'+(unread>0?' <span style="background:var(--amber);color:var(--base);padding:0 5px;border-radius:99px;font-size:9px;font-weight:800">'+unread+'</span>':'')+'</button>' +
          (p.status==='in_progress'?'<button class="btn sm primary" onclick="event.stopPropagation();markDelivered(\''+p.id+'\')">Mark delivered</button>':'')+
          '</div></div>';
      }).join('');
    }
  }

  if (state.teamInboxTab==='completed') {
    if (!completedProjs.length) {
      body='<div class="empty-state"><span class="empty-state-icon">&#127942;</span><div class="empty-state-title">No completed projects</div></div>';
    } else {
      body=completedProjs.map(function(p){
        return '<div class="brief-card clickable" onclick="setState({view:\'project\',activeProjectId:\''+p.id+'\',projectTab:\'overview\'})">' +
          '<div style="display:flex;justify-content:space-between;align-items:flex-start">' +
          '<div><div style="font-size:15px;font-weight:700;letter-spacing:-0.02em">'+p.title+'</div>' +
          '<div style="font-size:12px;color:var(--ink-3)">'+p.clientName+' &middot; Paid '+p.paidAt+'</div></div>' +
          '<div style="text-align:right"><div style="font-size:16px;font-weight:700;color:var(--amber)">'+fmt(p.totalPrice)+'</div><span class="brief-status paid">Paid</span></div></div></div>';
      }).join('');
    }
  }

  return '<div>'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">' +
    '<div class="section-title">Inbox</div>' +
    (pending.length>0?'<span class="badge amber" style="animation:pulse 2s infinite">'+pending.length+' pending</span>':'')+
    '</div>' +
    '<div class="section-sub" style="margin-bottom:16px">Client briefs and active project management for '+myTeam.name+'</div>' +
    tabHtml+body+'</div>';
}

// TEAMS DIRECTORY

function renderTeamsDirectory() {
  const specs = ['All'].concat(OCCASIONS.map(function(o){return o.title;}));
  const specChips = specs.map(function(s){
    return '<button class="chip '+(state.teamsSpecFilter===s?'active':'')+'" onclick="setState({teamsSpecFilter:\''+s+'\'})" style="font-size:11px">'+s+'</button>';
  }).join('');
  const availChips = ['All','Available','Busy','Away'].map(function(a){
    return '<button class="avail-chip '+(state.teamsAvailFilter===a?'active':'')+'" onclick="setState({teamsAvailFilter:\''+a+'\'})">'+a+'</button>';
  }).join('');

  const filtered = state.productionTeams.filter(function(t){
    const specOk = state.teamsSpecFilter==='All' || t.specialties.indexOf(state.teamsSpecFilter)>=0;
    const avOk = state.teamsAvailFilter==='All' || t.availability===state.teamsAvailFilter.toLowerCase();
    return specOk && avOk;
  });

  const cards = filtered.map(function(team){
    const info = availInfo(team.availability);
    const specTags = team.specialties.slice(0,3).map(function(s){return '<span class="spec-tag">'+s+'</span>';}).join('');
    const thumb = (team.portfolio&&team.portfolio[0]) ? getYtThumb(team.portfolio[0].url) : null;
    const cardTop = thumb
      ? '<div style="height:120px;background:url(\''+thumb+'\') center/cover;position:relative;margin:-0px"><div style="position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,var(--base-2) 100%)"></div><div class="team-card-bar" style="background:'+team.accentColor+'"></div></div>'
      : '<div class="team-card-bar" style="background:'+team.accentColor+'"></div>';

    return '<div class="team-card reveal" onclick="setState({view:\'team-profile\',selectedTeamId:\''+team.id+'\'})">' +
      cardTop +
      '<div class="team-card-body">' +
      '<div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px">' +
      '<div class="team-avatar" style="background:'+team.accentColor+'">'+team.initials+'</div>' +
      (team.verified?'<span class="badge info" style="font-size:9px">&#10003; Verified</span>':'') + '</div>' +
      '<div class="team-name">'+team.name+'</div>' +
      '<div class="team-tagline">'+team.tagline+'</div>' +
      '<div class="team-specialties">'+specTags+'</div>' +
      '<div class="team-meta-row">' +
      '<div class="team-rating">'+renderStars(team.rating,12)+' '+team.rating+' <span style="font-size:11px;color:var(--ink-4);font-weight:400">('+team.reviewCount+')</span></div>' +
      '<div class="avail-badge" style="background:'+info.color+'18;color:'+info.color+'"><div class="avail-dot" style="background:'+info.color+'"></div>'+info.label+'</div>' +
      '</div></div></div>';
  }).join('') || '<div style="grid-column:1/-1;text-align:center;padding:40px 0;color:var(--ink-3)">No teams match the selected filters.</div>';

  return renderNav('teams') + renderAuthOverlay() +
    '<div class="teams-hero">' +
    '<div class="landing-eyebrow reveal" style="margin-bottom:14px"><span style="width:6px;height:6px;background:var(--amber);border-radius:50%;display:inline-block"></span> '+state.productionTeams.length+' Production Teams</div>' +
    '<h2 class="reveal">Find your production partner.</h2>' +
    '<p class="reveal">Verified AV teams across Nairobi and East Africa. Browse by specialty, check real availability, watch their work, and read client reviews.</p></div>' +
    '<div class="teams-filter-bar"><div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center">'+specChips+'</div>' +
    '<div style="width:100%;border-top:1px solid var(--border);margin:8px 0"></div>' +
    '<div style="display:flex;gap:6px">'+availChips+'</div></div>' +
    '<div class="team-grid">'+cards+'</div>';
}

function renderTeamProfile() {
  const team = state.productionTeams.find(function(t){return t.id===state.selectedTeamId;});
  if (!team) return renderTeamsDirectory();

  const info = availInfo(team.availability);

  // Portfolio section
  const portfolioItems = (team.portfolio||[]).map(function(p){
    const thumb = getYtThumb(p.url);
    const icon = p.url.indexOf('soundcloud')>=0 ? '🎵' : p.url.indexOf('vimeo')>=0 ? '▶' : '▶';
    return '<a href="'+p.url+'" target="_blank" style="text-decoration:none">' +
      '<div class="portfolio-item">' +
      (thumb?'<img src="'+thumb+'" alt="'+p.caption+'" />':'<div class="portfolio-placeholder">'+icon+'</div>') +
      '<div class="portfolio-item-overlay"><div><span class="portfolio-type-tag">'+p.type+'</span><div class="portfolio-caption">'+p.caption+'</div></div></div>' +
      '<div class="portfolio-play">&#9654;</div>' +
      '</div></a>';
  }).join('');

  const portfolioSection = portfolioItems ? (
    '<div class="card reveal" style="margin-bottom:18px">' +
    '<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-4);margin-bottom:12px">Work samples</div>' +
    '<div class="portfolio-grid">'+portfolioItems+'</div></div>'
  ) : '';

  // Services
  const activeTemplates = state.templates.filter(function(t){return team.activeTemplates.indexOf(t.id)>=0;});
  const services = activeTemplates.length > 0 ? activeTemplates.map(function(t){
    const plain = PLAIN_NAMES[t.id]||{name:t.name};
    const basePrice = t.outputs.filter(function(o){return o.required;}).reduce(function(a,o){return a+o.price;},0);
    const customBase = t.outputs.filter(function(o){return o.required;}).reduce(function(a,o){
      const cp = team.customPrices&&team.customPrices[o.id]!==undefined?team.customPrices[o.id]:null;
      return a+(cp!==null?cp:o.price);
    },0);
    return '<div class="service-row">' +
      '<div style="flex:1"><div style="font-size:13px;font-weight:700">'+plain.name+'</div><div style="font-size:11.5px;color:var(--ink-3)">'+t.category+' &middot; '+t.outputs.length+' outputs &middot; '+t.baseTimeline+'+ days</div></div>' +
      '<div style="text-align:right;margin-right:10px"><div style="font-size:13px;font-weight:700;color:var(--amber)">From '+fmt(customBase)+'</div>' +
      (customBase!==basePrice?'<div style="font-size:10.5px;color:var(--ink-4);text-decoration:line-through">'+fmt(basePrice)+'</div>':'')+'</div>' +
      '<button class="btn sm primary" onclick="addToCart(\''+t.id+'\');setState({view:\'browse\'})">+ Add to brief</button></div>';
  }).join('') : '<div style="font-size:13px;color:var(--ink-3);padding:14px 0">No services listed yet.</div>';

  // Reviews
  const reviews = team.reviews.map(function(r){
    return '<div class="review-card reveal">' +
      '<div class="review-header"><div class="review-avatar">'+r.initials+'</div>' +
      '<div><div class="review-author">'+r.author+'</div><div class="review-meta">'+r.project+' &middot; '+r.date+'</div></div>' +
      '<div style="margin-left:auto">'+renderStars(r.stars,12)+'</div></div>' +
      '<div class="review-text">'+r.text+'</div></div>';
  }).join('') || '<div style="font-size:13px;color:var(--ink-3);padding:20px 0;text-align:center">No reviews yet. Be the first.</div>';

  const availMsg = team.availability==='available'?'Currently taking on new projects.':team.availability==='busy'?'Fully booked &mdash; enquire for future dates.':'Currently away &mdash; reach out to discuss.';
  const specBadges = team.specialties.map(function(s){return '<span style="padding:2px 9px;border-radius:99px;font-size:10.5px;background:var(--base-4);color:var(--ink-3);border:1px solid var(--border)">'+s+'</span>';}).join('');

  return renderNav('team-profile') + renderAuthOverlay() + renderRatingModal() +
    '<div>' +
    '<div class="team-profile-cover" style="background:linear-gradient(135deg,'+team.accentColor+'22,'+team.accentColor+'05 100%)">' +
    '<div style="position:absolute;inset:0;background:linear-gradient(to bottom,transparent 50%,var(--base) 100%)"></div></div>' +
    '<div class="team-profile-meta">' +
    '<div style="display:flex;align-items:flex-end;gap:16px;margin-bottom:16px">' +
    '<div class="team-profile-avatar" style="background:'+team.accentColor+'">'+team.initials+'</div>' +
    '<div>'+(team.verified?'<span class="badge info" style="font-size:9px;margin-bottom:8px;display:inline-flex">&#10003; Verified</span>':'') +
    '<div class="team-profile-title">'+team.name+'</div>' +
    '<div style="font-size:13px;color:var(--ink-3)">'+team.tagline+' &middot; &#128205; '+team.location+'</div>' +
    '</div></div></div>' +
    '<div class="profile-stats-bar">' +
    '<div class="pstat"><div class="pstat-value">'+team.rating+'</div><div class="pstat-label">Rating</div></div>' +
    '<div class="pstat"><div class="pstat-value">'+team.reviewCount+'</div><div class="pstat-label">Reviews</div></div>' +
    '<div class="pstat"><div class="pstat-value">'+(team.portfolio||[]).length+'</div><div class="pstat-label">Work samples</div></div>' +
    '<div class="pstat"><div class="pstat-value">'+team.completedProjects+'</div><div class="pstat-label">Projects</div></div>' +
    '</div>' +
    '<div class="profile-body">' +
    '<div>' +
    '<div style="background:'+info.color+'10;border:1px solid '+info.color+'22;border-radius:var(--r-md);padding:12px 16px;margin-bottom:18px;display:flex;align-items:center;gap:10px">' +
    '<div class="avail-dot" style="background:'+info.color+';width:9px;height:9px"></div>' +
    '<div><div style="font-size:13px;font-weight:700;color:'+info.color+'">'+info.label+'</div><div style="font-size:12px;color:var(--ink-3)">'+team.availabilityNote+'</div></div></div>' +
    portfolioSection +
    '<div class="card reveal" style="margin-bottom:18px"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-4);margin-bottom:10px">About</div>' +
    '<p style="font-size:13.5px;color:var(--ink-2);line-height:1.75">'+team.bio+'</p>' +
    '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:14px">'+team.specialties.map(function(s){return '<span class="spec-tag">'+s+'</span>';}).join('')+'</div></div>' +
    '<div class="card reveal" style="margin-bottom:18px"><div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-4);margin-bottom:14px">Services &amp; pricing</div>'+services+'</div>' +
